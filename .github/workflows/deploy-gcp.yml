name: Deploy to Google Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: community-hero-501014 # Replace with your project ID
  REGION: us-central1
  GAR_LOCATION: us-central1-docker.pkg.dev
  REPOSITORY: community-hero-repo
  API_SERVICE: community-hero-api
  WEB_SERVICE: community-hero-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: actions/checkout@v4

    # Setup Google Cloud Auth via Workload Identity Federation (Recommended)
    # Alternatively, you can use a Service Account Key JSON
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        # replace with your workload identity provider
        # workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Docker Auth'
      run: |-
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}

    - name: 'Build and Push API Image'
      run: |-
        IMAGE_NAME="${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.API_SERVICE }}:${{ github.sha }}"
        docker build -t $IMAGE_NAME -f apps/api/Dockerfile .
        docker push $IMAGE_NAME
        echo "API_IMAGE=$IMAGE_NAME" >> $GITHUB_ENV

    - name: 'Build and Push WEB Image'
      run: |-
        IMAGE_NAME="${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.WEB_SERVICE }}:${{ github.sha }}"
        docker build -t $IMAGE_NAME -f apps/web/Dockerfile .
        docker push $IMAGE_NAME
        echo "WEB_IMAGE=$IMAGE_NAME" >> $GITHUB_ENV

    - name: 'Deploy API to Cloud Run'
      id: deploy-api
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.API_SERVICE }}'
        region: '${{ env.REGION }}'
        image: '${{ env.API_IMAGE }}'

    - name: 'Deploy WEB to Cloud Run'
      id: deploy-web
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.WEB_SERVICE }}'
        region: '${{ env.REGION }}'
        image: '${{ env.WEB_IMAGE }}'
